# Production buildspec for the iOS repo under test.
# Runs on the MAC_ARM CodeBuild fleet. The MCP ios_test tool overrides
# SCHEME / DEVICE / OS_VERSION / TEST_PLAN / PROJECT_DIR via
# environmentVariablesOverride; ARTIFACTS_BUCKET is set on the project.
#
# Each CodeBuild command runs in its own shell with a fresh CWD, so the whole
# run is ONE block to keep state (cd, vars) intact.
version: 0.2

env:
  variables:
    SCHEME: ""          # required (or auto-detected to the first shared scheme)
    DEVICE: "iPhone 17" # simulator device name
    OS_VERSION: "latest"
    TEST_PLAN: ""
    PROJECT_DIR: "."    # subdir holding the .xcworkspace/.xcodeproj (e.g. "ios")
    CACHE_MODE: "none"  # none | local | s3 — set by the CDK stack's cacheMode
    CLEAN_BUILD: ""     # "true" (per-call ios_test arg) forces a cold build, cache untouched

phases:
  build:
    commands:
      - |
        # No global `set -e`: scheme/device probing uses commands that return
        # nonzero on "no match" (ls, grep), which would abort the run before
        # xcodebuild ever ran. We capture the test exit code explicitly instead.
        #
        # ALL output (probing, dep resolve, compile, test) is tee'd to a single
        # build_output.log, and that log + an error_tail.txt are ALWAYS uploaded
        # to builds/<id>/ — even when the build fails before any test runs (bad
        # PROJECT_DIR, scheme not found, compile/dep error). That is the contract
        # the get_build_log tool reads, so the agent always sees the raw error.
        LOG="$CODEBUILD_SRC_DIR/build_output.log"

        # Repair cache writability before xcodebuild touches it. CodeBuild macOS
        # restores cached dirs (DerivedData, the SwiftPM home cache) from a prior
        # build's tarball, which preserves ownership. If any earlier run wrote
        # there as root, the restored files come back root-owned and the build
        # user can't write them, so package resolution dies with POSIX 13
        # "permission denied" mid-run. Reclaim ownership + perms; if a dir is
        # still unwritable, reset it so the build proceeds cold and repopulates
        # the cache cleanly — never a hard failure on a poisoned cache.
        # sudo -n: never block on a password prompt. CodeBuild has no tty, so a
        # bare `sudo` could hang reading stdin; -n fails fast instead.
        ensure_writable() {
          local me; me="$(id -un)"
          for d in "$@"; do
            mkdir -p "$d" 2>/dev/null || sudo -n mkdir -p "$d" 2>/dev/null || true
            sudo -n chown -R "$me" "$d" 2>/dev/null || chown -R "$me" "$d" 2>/dev/null || true
            chmod -R u+rwX "$d" 2>/dev/null || sudo -n chmod -R u+rwX "$d" 2>/dev/null || true
            # A writable parent can still hide root-owned CHILDREN (e.g.
            # DerivedData/SourcePackages/repositories) that survive a failed
            # chown when sudo isn't honored on the cache mount. Probe the whole
            # tree: any path not owned by us, or a failed NESTED write, means
            # repair didn't take -> reset that dir cold so the run proceeds.
            if find "$d" ! -user "$me" -print -quit 2>/dev/null | grep -q . \
               || ! ( mkdir -p "$d/.wtest" && : > "$d/.wtest/probe" ) 2>/dev/null; then
              echo "Cache dir poisoned/unwritable, resetting cold: $d"
              sudo -n rm -rf "$d" 2>/dev/null || rm -rf "$d" 2>/dev/null || true
              mkdir -p "$d"
            fi
            rm -rf "$d/.wtest" 2>/dev/null || true
          done
        }

        # Everything below runs inside run() so we can pipe the whole thing to
        # tee and still recover the real exit code via PIPESTATUS. Use `return`
        # (never `exit`) inside run() so diagnostics upload regardless.
        run() {
          BRANCH="${CODEBUILD_WEBHOOK_HEAD_REF:-${CODEBUILD_SOURCE_VERSION:-main}}"
          BRANCH="${BRANCH##refs/heads/}"
          cd "$CODEBUILD_SRC_DIR/$PROJECT_DIR" || { echo "ERROR: PROJECT_DIR '$PROJECT_DIR' not found under $CODEBUILD_SRC_DIR"; return 1; }

          # --- pick container: workspace beats project (globs may not match) ---
          WS=""; PROJ=""
          for f in *.xcworkspace; do [ -e "$f" ] && WS="$f" && break; done
          for f in *.xcodeproj;   do [ -e "$f" ] && PROJ="$f" && break; done
          if [ -z "$WS" ] && [ -z "$PROJ" ]; then echo "ERROR: no .xcworkspace or .xcodeproj found in $(pwd)"; return 1; fi
          if [ -n "$WS" ]; then CONTAINER=(-workspace "$WS"); else CONTAINER=(-project "$PROJ"); fi
          echo "Container: ${CONTAINER[*]}"

          # --- publish scheme manifest for the list_schemes tool ---
          LIST_JSON=$(xcodebuild "${CONTAINER[@]}" -list -json 2>/dev/null || echo '{}')
          echo "$LIST_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin) or {}; k='workspace' if 'workspace' in d else ('project' if 'project' in d else None); s=(d.get(k,{}).get('schemes') if k else []) or []; print(json.dumps({'schemes': s, 'default_scheme': s[0] if s else ''}))" > schemes.json
          aws s3 cp schemes.json "s3://$ARTIFACTS_BUCKET/schemes/$BRANCH.json" || true
          [ -z "$SCHEME" ] && SCHEME=$(python3 -c "import json;print(json.load(open('schemes.json'))['default_scheme'])")
          if [ -z "$SCHEME" ]; then echo "ERROR: no scheme given and none auto-detected (shared schemes: $(python3 -c "import json;print(json.load(open('schemes.json'))['schemes'])" 2>/dev/null))"; return 1; fi
          echo "Using scheme: $SCHEME"

          # --- resolve a concrete simulator (id beats name; avoids ambiguity) ---
          DEST_ID=$(xcrun simctl list devices available | grep -F "$DEVICE (" | head -1 | sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/')
          if [ -z "$DEST_ID" ]; then
            echo "Device '$DEVICE' not found; available:"; xcrun simctl list devices available | grep -i iphone
            DEST_ID=$(xcrun simctl list devices available | grep -iE 'iPhone' | head -1 | sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/')
          fi
          [ -z "$DEST_ID" ] && { echo "ERROR: no iPhone simulator available"; return 1; }
          xcrun simctl boot "$DEST_ID" || true

          # --- build cache: reuse DerivedData across builds when enabled ---
          # CACHE_MODE local/s3 -> point DerivedData at a cached dir so only changed
          # files recompile on the next run (the tight fix->retest loop). The paths
          # in this file's `cache:` block are what CodeBuild persists.
          # CLEAN_BUILD=true (per-call ios_test arg) forces a cold build for THIS run
          # without disturbing the cache: it points DerivedData at a fresh ephemeral
          # dir, so nothing cached is reused and the cache is left intact for next time.
          # Global caches xcodebuild touches on EVERY build (clean or not),
          # restored by the project cache with their prior owner. These are the
          # literal paths the `cache:` block persists -- keep the two lists in
          # sync. They must be healed even for a clean build, because clean_build
          # only swaps DerivedData; SwiftPM/CocoaPods still read these and a
          # root-owned restore here is what kills dep resolution with POSIX 13.
          GLOBAL_CACHES=(
            "/Users/cbuser/Library/Caches/org.swift.swiftpm"
            "/Users/cbuser/Library/Caches/CocoaPods"
          )
          DERIVED_ARGS=()
          # When the project cache is active (CACHE_MODE != none, set in lockstep
          # with the project's cache config), the global caches were restored and
          # may be poisoned -- heal them regardless of clean_build.
          [ "$CACHE_MODE" != "none" ] && ensure_writable "${GLOBAL_CACHES[@]}"
          if [ "$CLEAN_BUILD" = "true" ]; then
            DERIVED="/tmp/ios-mcp-clean-$CODEBUILD_BUILD_NUMBER/DerivedData"
            mkdir -p "$DERIVED"
            DERIVED_ARGS=(-derivedDataPath "$DERIVED")
            echo "Clean build requested -> fresh DerivedData at $DERIVED (persisted DerivedData untouched)"
          elif [ "$CACHE_MODE" != "none" ]; then
            DERIVED="/tmp/ios-mcp-cache/DerivedData"
            DERIVED_ARGS=(-derivedDataPath "$DERIVED")
            ensure_writable "$DERIVED"
            echo "Cache mode: $CACHE_MODE -> $DERIVED"
          fi

          # --- resolve deps (surface failures; do not swallow), then test ---
          echo "=== resolvePackageDependencies ==="
          if ! xcodebuild "${CONTAINER[@]}" -resolvePackageDependencies -scheme "$SCHEME" "${DERIVED_ARGS[@]}"; then
            echo "ERROR: package dependency resolution failed (see above)"; return 65
          fi
          TESTPLAN_ARG=(); [ -n "$TEST_PLAN" ] && TESTPLAN_ARG=(-testPlan "$TEST_PLAN")
          echo "=== xcodebuild test ==="
          xcodebuild test \
            "${CONTAINER[@]}" \
            -scheme "$SCHEME" \
            -destination "id=$DEST_ID" \
            -resultBundlePath "$CODEBUILD_SRC_DIR/TestResults.xcresult" \
            "${TESTPLAN_ARG[@]}" \
            "${DERIVED_ARGS[@]}" \
            -enableCodeCoverage YES
          return ${PIPESTATUS[0]}
        }

        run 2>&1 | tee "$LOG"
        TEST_RC=${PIPESTATUS[0]}

        # --- diagnostics: ALWAYS upload the raw log + a focused error tail, so a
        #     build that fails before tests still surfaces its real error via the
        #     get_build_log tool / ios_build_status build_errors. ---
        {
          echo "=== error / failure lines ===";
          grep -nE 'error:|fatal error|\*\* (BUILD|TEST|CLEAN) FAILED|xcodebuild: error|Code=|No such|not found|Unable to|Could not|Testing cancelled|Linker command failed' "$LOG" | tail -120;
          echo; echo "=== last 100 lines ==="; tail -100 "$LOG";
        } > "$CODEBUILD_SRC_DIR/error_tail.txt" 2>/dev/null || true
        aws s3 cp "$LOG" "s3://$ARTIFACTS_BUCKET/builds/$CODEBUILD_BUILD_ID/build_output.log" || true
        aws s3 cp "$CODEBUILD_SRC_DIR/error_tail.txt" "s3://$ARTIFACTS_BUCKET/builds/$CODEBUILD_BUILD_ID/error_tail.txt" || true

        # --- artifacts: screenshot + xcresult zip to S3 (best-effort) ---
        cd "$CODEBUILD_SRC_DIR"
        [ -n "$DEST_ID" ] && xcrun simctl io "$DEST_ID" screenshot screenshot_final.png || true
        [ -f screenshot_final.png ] && aws s3 cp screenshot_final.png "s3://$ARTIFACTS_BUCKET/builds/$CODEBUILD_BUILD_ID/screenshots/" || true
        if [ -d TestResults.xcresult ]; then
          ditto -c -k --sequesterRsrc --keepParent TestResults.xcresult TestResults.xcresult.zip || true
          aws s3 cp TestResults.xcresult.zip "s3://$ARTIFACTS_BUCKET/builds/$CODEBUILD_BUILD_ID/TestResults.xcresult.zip" || true
        fi

        # --- parse results: summary.json (authoritative, read by the Lambda) + JUnit (console) ---
        if [ -d TestResults.xcresult ]; then
          aws s3 cp "s3://$ARTIFACTS_BUCKET/tooling/xcresult_to_junit.py" /tmp/conv.py
          python3 /tmp/conv.py TestResults.xcresult "$CODEBUILD_SRC_DIR/test_results.xml" "$CODEBUILD_SRC_DIR/summary.json" || true
        fi
        # summary.json is the contract with ios_build_status — upload even on failure.
        if [ ! -f "$CODEBUILD_SRC_DIR/summary.json" ]; then
          # No xcresult (failed before tests). Write a summary that points the
          # agent at the build log so the failure is never opaque.
          python3 -c "import json;json.dump({'total':0,'passed':0,'failed':0,'skipped':0,'error':'build failed before tests ran; see build_errors / get_build_log'}, open('$CODEBUILD_SRC_DIR/summary.json','w'))" || echo '{"total":0,"passed":0,"failed":0,"skipped":0}' > "$CODEBUILD_SRC_DIR/summary.json"
        fi
        aws s3 cp "$CODEBUILD_SRC_DIR/summary.json" "s3://$ARTIFACTS_BUCKET/builds/$CODEBUILD_BUILD_ID/summary.json" || true
        echo "=== summary.json ==="; cat "$CODEBUILD_SRC_DIR/summary.json" || true
        exit $TEST_RC

reports:
  ios-test-report:
    files:
      - "test_results.xml"
    file-format: "JUNITXML"

artifacts:
  files:
    - "build_output.log"
    - "screenshot_final.png"
  base-directory: "."

# Paths CodeBuild persists between builds when cacheMode is 'local' or 's3'
# (ignored when 'none'). DerivedData is the big win for the fix->retest loop;
# SPM/CocoaPods caches avoid re-downloading dependencies.
cache:
  paths:
    - "/tmp/ios-mcp-cache/DerivedData/**/*"
    - "/Users/cbuser/Library/Caches/org.swift.swiftpm/**/*"
    - "/Users/cbuser/Library/Caches/CocoaPods/**/*"
